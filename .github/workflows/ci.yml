name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Typecheck
        run: pnpm lint
      - name: Test
        run: pnpm test

  web:
    name: Web (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Typecheck
        run: pnpm lint
      - name: Build
        run: pnpm build

  indexer:
    name: Indexer (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/indexer
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/indexer
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (also compiles the crate)
        run: cargo clippy -- -D warnings
