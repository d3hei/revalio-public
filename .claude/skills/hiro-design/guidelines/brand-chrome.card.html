<!-- @dsCard group="Brand" viewport="700x180" name="UI Chrome" subtitle="Bracketed labels, slash eyebrows, [X] toggles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); font-family: var(--font-mono); }
  .wrap { padding: 26px 30px; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .bracket { border: 1px solid var(--hiro-ink); padding: 9px 16px; font-size: 12px; letter-spacing: var(--ls-wide); text-transform: uppercase; color: var(--text-strong); }
  .bracket.fill { background: var(--hiro-ink); color: var(--hiro-white); }
  .eyebrow { font-size: 11px; letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--text-muted); }
  .toggle { display:flex; align-items:center; gap:8px; font-size: 11px; letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--text-strong); }
  .x { width: 18px; height: 18px; border: 1px solid var(--hiro-ink); display: grid; place-items: center; font-size: 11px; }
  .x.on { background: var(--accent); color: #fff; border-color: var(--accent); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <span class="eyebrow">/ Tools</span>
      <span class="eyebrow">/ APIs</span>
      <span class="eyebrow">/ Company</span>
    </div>
    <div class="row">
      <span class="bracket fill">[ Subscribe ]</span>
      <span class="bracket">[ Start coding → ]</span>
      <span class="toggle"><span class="x on">×</span> Bento</span>
      <span class="toggle"><span class="x">×</span> Tree</span>
    </div>
  </div>
</body>
</html>
