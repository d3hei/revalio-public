<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); font-family: var(--font-body); }
  .wrap { padding: 22px 28px; max-width: 620px; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--text-faint); margin-bottom: 8px; }
  .lead { font-size: 18px; line-height: 1.5; color: var(--text-body); margin: 0 0 16px; }
  .body { font-size: 15px; line-height: 1.6; color: var(--text-muted); margin: 0; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="tag">Lead / 18px · 1.5</div>
    <p class="lead">Building on Bitcoin is hard. Hiro's developer tools make it easier.</p>
    <div class="tag">Body / 15–16px · 1.6</div>
    <p class="body">We see Bitcoin as the foundational layer for web3, with independent layers like Stacks extending its functionality without changing Bitcoin itself or compromising its security.</p>
  </div>
</body>
</html>
