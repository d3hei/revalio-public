<!-- @dsCard group="Colors" viewport="700x150" name="Brand" subtitle="Violet primary + Bitcoin orange accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-mono); background: var(--bg-canvas); }
  .row { display: flex; gap: 14px; padding: 20px; }
  .sw { flex: 1; }
  .chip { height: 76px; border-radius: var(--radius-sm); border: 1px solid rgba(0,0,0,0.06); }
  .name { font-size: 11px; letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--text-strong); margin-top: 10px; }
  .hex { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--hiro-violet)"></div><div class="name">Violet</div><div class="hex">#5546FF</div></div>
    <div class="sw"><div class="chip" style="background:var(--hiro-violet-700)"></div><div class="name">Violet 700</div><div class="hex">#3F31E0</div></div>
    <div class="sw"><div class="chip" style="background:var(--hiro-violet-50)"></div><div class="name">Violet 50</div><div class="hex">#ECEAFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--hiro-orange)"></div><div class="name">Orange</div><div class="hex">#F7931A</div></div>
    <div class="sw"><div class="chip" style="background:var(--hiro-orange-50)"></div><div class="name">Orange 50</div><div class="hex">#FDF0DC</div></div>
  </div>
</body>
</html>
