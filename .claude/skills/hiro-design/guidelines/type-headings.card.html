<!-- @dsCard group="Type" viewport="700x300" name="Heading Scale" subtitle="H1–H4, Space Grotesk" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); font-family: var(--font-display); color: var(--text-strong); }
  .wrap { padding: 22px 28px; display: flex; flex-direction: column; gap: 14px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--text-faint); width: 64px; flex: none; }
  .h1 { font-size: 48px; font-weight: 700; letter-spacing: -0.025em; line-height: 1; }
  .h2 { font-size: 34px; font-weight: 700; letter-spacing: -0.02em; }
  .h3 { font-size: 24px; font-weight: 600; letter-spacing: -0.015em; }
  .h4 { font-size: 18px; font-weight: 600; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span class="tag">H1 / 56</span><span class="h1">Developer tools</span></div>
    <div class="line"><span class="tag">H2 / 40</span><span class="h2">for Bitcoin layers</span></div>
    <div class="line"><span class="tag">H3 / 28</span><span class="h3">Re-org aware indexing</span></div>
    <div class="line"><span class="tag">H4 / 20</span><span class="h4">Write & deploy contracts</span></div>
  </div>
</body>
</html>
