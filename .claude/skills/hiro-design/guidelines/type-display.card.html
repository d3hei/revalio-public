<!-- @dsCard group="Type" viewport="700x200" name="Display" subtitle="Space Grotesk Bold — hero headlines, tight & uppercase" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); }
  .wrap { padding: 24px 28px; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }
  .disp { font-family: var(--font-display); font-weight: 700; font-size: 72px; line-height: 0.92; letter-spacing: var(--ls-display); color: var(--text-strong); text-transform: uppercase; margin: 0; }
  .disp .v { color: var(--accent); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">/ Display · 72–88px · 700 · -0.03em</div>
    <h1 class="disp">Build web3<br>on <span class="v">Bitcoin.</span></h1>
  </div>
</body>
</html>
